{% extends "base.html" %}
{% block title %}Tomar turno — Enfermería Campus{% endblock %}

{% block content %}
<h1>Tomar turno</h1>
<p class="subtitle">Regístrate para unirte a la fila de enfermería.</p>

<div class="card">
    <input  type="text" id="name" placeholder="Nombre completo">
    <select id="person_type">
        <option value="student">Estudiante</option>
        <option value="worker">Trabajador</option>
    </select>
    <button class="primary" onclick="joinQueue()">Entrar a la fila</button>
</div>

<div id="result" class="alert"></div>

<div class="nav-buttons">
    <a href="/"><button class="primary" style="background:#555">← Volver al inicio</button></a>
    <a href="/staff"><button class="primary" style="background:#2d5a3d">Ver fila →</button></a>
</div>
{% endblock %}

{% block scripts %}
<script>
async function joinQueue() {
    const name        = document.getElementById('name').value.trim();
    const person_type = document.getElementById('person_type').value;

    if (!name) {
        showAlert('Escribe tu nombre completo.', 'error');
        return;
    }

    const res  = await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, person_type }),
    });
    const data = await res.json();

    if (res.ok) {
        showAlert(`✓ Turno tomado. Bienvenido/a <strong>${data.name}</strong>. Tu ID es <strong>#${data.id}</strong>.`, 'success');
        document.getElementById('name').value = '';
    } else {
        showAlert('Error al registrarse. Intenta de nuevo.', 'error');
    }
}

function showAlert(msg, type) {
    const el = document.getElementById('result');
    el.className      = `alert ${type}`;
    el.innerHTML      = msg;
    el.style.display  = 'block';
}
</script>
{% endblock %}
