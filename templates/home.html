<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Enfermería Campus</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        input, select, button { display: block; width: 100%; margin: 8px 0; padding: 8px; font-size: 1rem; }
        button { background: #2563eb; color: white; border: none; cursor: pointer; border-radius: 4px; }
        #result { margin-top: 20px; padding: 12px; background: #f0fdf4; border-radius: 4px; display: none; }
        #queue-list { margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 8px; border: 1px solid #e5e7eb; text-align: left; }
    </style>
</head>
<body>

    <h1>Enfermería — Fila Virtual</h1>

    <!-- Join form -->
    <h2>Tomar turno</h2>
    <input  type="text" id="name" placeholder="Nombre completo">
    <select id="role_type">
        <option value="student">Estudiante</option>
        <option value="worker">Trabajador</option>
    </select>
    <button onclick="joinQueue()">Entrar a la fila</button>

    <div id="result">
        <strong>¡Turno tomado!</strong>
        <p>Nombre: <span id="res-name"></span></p>
        <p>Posición en fila: <span id="res-position"></span></p>
    </div>

    <!-- Current queue -->
    <div id="queue-list">
        <h2>Fila actual <button onclick="loadQueue()" style="width:auto;padding:4px 10px;font-size:.85rem">Actualizar</button></h2>
        <table>
            <thead><tr><th>#</th><th>Nombre</th><th>Tipo</th><th>Esperando desde</th></tr></thead>
            <tbody id="queue-body"></tbody>
        </table>
    </div>

    <script>
        async function joinQueue() {
            const name = document.getElementById('name').value.trim();
            const role_type = document.getElementById('role_type').value;
            if (!name) return alert('Escribe tu nombre.');

            const res  = await fetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, role_type }),
            });
            const data = await res.json();

            document.getElementById('res-name').textContent     = data.name;
            document.getElementById('res-position').textContent = data.id;
            document.getElementById('result').style.display     = 'block';
            loadQueue();
        }

        async function loadQueue() {
            const res  = await fetch('/api/queue');
            const data = await res.json();
            const body = document.getElementById('queue-body');
            body.innerHTML = data.length
                ? data.map((e, i) => `
                    <tr>
                        <td>${i + 1}</td>
                        <td>${e.user_name}</td>
                        <td>${e.user_type ?? '—'}</td>
                        <td>${new Date(e.joined_at).toLocaleTimeString()}</td>
                    </tr>`).join('')
                : '<tr><td colspan="4">La fila está vacía.</td></tr>';
        }

        loadQueue();
    </script>

</body>
</html>
