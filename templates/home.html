{% extends "base.html" %}
{% block title %}Inicio — Enfermería Campus{% endblock %}

{% block content %}
<h1>Enfermería Campus</h1>
<p class="subtitle">Bienvenido/a. Toma tu turno o consulta la fila actual.</p>

<div class="nav-buttons">
    <a href="/form"><button class="primary">+ Tomar turno</button></a>
    <a href="/staff"><button class="primary" style="background:#2d5a3d">Atender pacientes</button></a>
    <a href="/stats"><button class="primary" style="background:#4a6741">Ver estadísticas</button></a>
</div>

<div style="display:flex; justify-content:space-between; align-items:center; margin-top:36px;">
    <h2 style="margin:0">Fila actual</h2>
    <button class="small" onclick="loadQueue()">↻ Actualizar</button>
</div>

<div class="card" style="margin-top:12px; padding:0; overflow:hidden;">
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Tipo</th>
                <th>Esperando desde</th>
            </tr>
        </thead>
        <tbody id="queue-body">
            <tr><td colspan="4" style="color:#888; text-align:center; padding:24px">Cargando...</td></tr>
        </tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadQueue() {
    const res  = await fetch('/api/queue');
    const data = await res.json();
    const body = document.getElementById('queue-body');

    if (!data.length) {
        body.innerHTML = '<tr><td colspan="4" style="color:#888;text-align:center;padding:24px">La fila está vacía.</td></tr>';
        return;
    }

    body.innerHTML = data.map((e, i) => `
        <tr>
            <td><strong>${i + 1}</strong></td>
            <td>${e.user_name}</td>
            <td><span class="badge ${e.person_type}">${e.person_type === 'student' ? 'Estudiante' : 'Trabajador'}</span></td>
            <td style="color:#888">${new Date(e.joined_at).toLocaleTimeString()}</td>
        </tr>
    `).join('');
}

loadQueue();
</script>
{% endblock %}
