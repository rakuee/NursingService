<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Enfermería Campus{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Georgia', serif;
            background: #f7f6f2;
            color: #1a1a1a;
            min-height: 100vh;
        }

        nav {
            background: #1a3a2a;
            padding: 14px 40px;
            display: flex;
            align-items: center;
            gap: 32px;
        }

        nav .brand {
            color: #a8d5b5;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 0.05em;
            text-decoration: none;
            margin-right: auto;
        }

        nav a {
            color: #c8e6d0;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.03em;
            padding: 4px 0;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s, color 0.2s;
        }

        nav a:hover {
            color: white;
            border-bottom-color: #a8d5b5;
        }

        main {
            max-width: 680px;
            margin: 48px auto;
            padding: 0 24px;
        }

        h1 {
            font-size: 1.8rem;
            color: #1a3a2a;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 1.2rem;
            color: #2d5a3d;
            margin: 28px 0 12px;
        }

        .subtitle {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        input, select {
            width: 100%;
            padding: 10px 14px;
            margin: 6px 0;
            border: 1px solid #c8d8c8;
            border-radius: 6px;
            font-size: 0.95rem;
            background: white;
            color: #1a1a1a;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2d5a3d;
        }

        button.primary {
            width: 100%;
            padding: 11px;
            margin-top: 10px;
            background: #1a3a2a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: background 0.2s;
        }

        button.primary:hover { background: #2d5a3d; }

        button.small {
            padding: 5px 12px;
            background: #2d5a3d;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button.small:hover { background: #1a3a2a; }

        .card {
            background: white;
            border: 1px solid #dde8dd;
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 12px;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: bold;
            letter-spacing: 0.04em;
        }

        .badge.student { background: #dff0e8; color: #1a6b3a; }
        .badge.worker  { background: #e8eaf6; color: #3a3a8a; }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin: 16px 0;
            font-size: 0.92rem;
        }

        .alert.success { background: #dff0e8; color: #1a6b3a; border-left: 3px solid #2d5a3d; }
        .alert.error   { background: #fdecea; color: #8a1a1a; border-left: 3px solid #c0392b; }

        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; padding: 8px 12px; border-bottom: 2px solid #dde8dd; color: #555; font-size: 0.8rem; letter-spacing: 0.05em; text-transform: uppercase; }
        td { padding: 10px 12px; border-bottom: 1px solid #eef2ee; }
        tr:last-child td { border-bottom: none; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav>
        <a href="/" class="brand">✚ Enfermería Campus</a>
        <a href="/">Inicio</a>
        <a href="/form">Tomar turno</a>
        <a href="/staff">Atender</a>
        <a href="/stats">Estadísticas</a>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
