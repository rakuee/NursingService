{% extends "base.html" %}
{% block title %}Atender pacientes — Enfermería Campus{% endblock %}

{% block content %}
<h1>Atender pacientes</h1>
<p class="subtitle">Pacientes esperando ser atendidos. Pulsa "Atender" para llamar al siguiente.</p>

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
    <h2 style="margin:0">En espera</h2>
    <button class="small" onclick="loadQueue()">↻ Actualizar</button>
</div>

<div id="queue-container">
    <p style="color:#888">Cargando...</p>
</div>

<div id="attend-result" class="alert"></div>

<div class="nav-buttons">
    <a href="/"><button class="primary" style="background:#555">← Inicio</button></a>
    <a href="/stats"><button class="primary" style="background:#4a6741">Ver estadísticas →</button></a>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadQueue() {
    const res  = await fetch('/api/queue');
    const data = await res.json();
    const el   = document.getElementById('queue-container');

    if (!data.length) {
        el.innerHTML = '<div class="card" style="color:#888;text-align:center;padding:24px">La fila está vacía.</div>';
        return;
    }

    el.innerHTML = data.map((e, i) => `
        <div class="card" style="display:flex; align-items:center; gap:16px;">
            <span style="font-size:1.6rem; font-weight:bold; color:#c8d8c8; min-width:32px;">${i + 1}</span>
            <div style="flex:1">
                <strong>${e.user_name}</strong>
                <span class="badge ${e.role_type}" style="margin-left:8px">
                    ${e.role_type === 'student' ? 'Estudiante' : 'Trabajador'}
                </span>
                <div style="font-size:0.82rem; color:#888; margin-top:4px;">
                    En espera desde las ${new Date(e.joined_at).toLocaleTimeString()}
                </div>
            </div>
            <button class="small" onclick="attend(${e.user_id})">Atender</button>
        </div>
    `).join('');
}

async function attend(user_id) {
    const res  = await fetch('/api/queue/attend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id }),
    });
    const data = await res.json();
    const el   = document.getElementById('attend-result');

    if (res.ok) {
        el.className     = 'alert success';
        el.textContent   = `✓ ${data.user_name} fue atendido/a.`;
        el.style.display = 'block';
        loadQueue();
    } else {
        el.className     = 'alert error';
        el.textContent   = 'Error al atender. Intenta de nuevo.';
        el.style.display = 'block';
    }

    setTimeout(() => el.style.display = 'none', 3000);
}

loadQueue();
</script>
{% endblock %}
